# MySQL 配置
[mysql]
host = localhost
user = root
password = 123456
database = subjects_kg

# Redis 配置
[redis]
host = 192.168.88.161
port = 6379
password = 1234
db = 0

# Milvus 配置
[milvus]
host = 192.168.88.161
port = 19530
# 记得创建这个表
database_name = itcast
collection_name = edurag_final

# LLM 配置
[llm]
#deepseek-v4-flash deepseek-v4-pro
model = deepseek-v4-pro
# 从环境变量 DEEPSEEK_API_KEY 或 .env 读取，避免把密钥提交到代码仓库
deepseek_api_key =
deepseek_base_url = https://api.deepseek.com
# 最大输出 token 数 (DeepSeek V4 Pro 支持 128K)
max_tokens = 131072
# 推理强度: high 或 max (max = 最强推理)
reasoning_effort = max
# 思考模式: enabled 或 disabled
thinking = enabled
# 是否向前端输出思考过程 (debug时开启)
show_thinking = false

# 检索参数配置
[retrieval]
parent_chunk_size = 1200
child_chunk_size = 300
chunk_overlap = 50
retrieval_k = 5
candidate_m = 2

# 日志配置
[logger]
log_file = logs/app.log
# 应用配置
[app]
valid_sources = ["ai", "java", "test", "ops", "bigdata"]
customer_service_phone = 12345678
