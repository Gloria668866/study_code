<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北京AI25期大模型</title>
<style>
    :root {
        --primary-glow-color: rgba(0, 191, 255, 0.7);
        --winner-glow-color: #ffd700;
    }

    body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        color: #fff;
        text-align: center;
    }

    /* 优化：最终版水印样式 */
    #watermark {
    position: fixed;
    top: 30px;
    right: 40px;
    z-index: 1002;
    pointer-events: none;
    font-size: 36px; /* 醒目的大字体 */
    font-family: "Microsoft YaHei", sans-serif;
    font-weight: bold;
    color: #00ffff; /* 青色 */
    text-shadow:
        0 0 10px rgba(0, 255, 255, 0.8),
        0 0 20px rgba(0, 255, 255, 0.6),
        0 0 35px rgba(0, 255, 255, 0.4);
}

    #starry-sky {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    #star-container {
        position: absolute;
        width: 100%;
        height: 100%;
        perspective: 1200px;
        transition: transform 2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    @keyframes twinkle {
        0%, 100% {
            opacity: 1;
            box-shadow: 0 0 16px var(--primary-glow-color), inset 0 0 10px rgba(0, 191, 255, 0.4);
        }
        50% {
            opacity: 0.3;
            box-shadow: 0 0 6px var(--primary-glow-color), inset 0 0 4px rgba(0, 191, 255, 0.2);
        }
    }

    .star {
        position: absolute;
        width: 80px;
        height: 80px;
        font-size: 16px;
        background-color: rgba(0, 191, 255, 0.1);
        border: 2px solid var(--primary-glow-color);
        border-radius: 50%;
        transform-style: preserve-3d;
        transition: transform 0.5s ease-out, opacity 0.5s, border-color 0.5s, box-shadow 0.5s;
        cursor: default;
        color: #fff;
        text-shadow: 0 0 5px #00bfff, 0 0 10px #00bfff;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 1;
        animation: twinkle 4s ease-in-out infinite;
    }

    .star.dimmed {
        animation: none;
        opacity: 0.15;
    }

    .star.winner {
        animation: none;
        opacity: 1 !important;
        border-color: var(--winner-glow-color);
        box-shadow: 0 0 25px var(--winner-glow-color), 0 0 40px rgba(255, 165, 0, 0.7);
        transform: var(--original-transform) scale3d(2, 2, 2) !important;
        z-index: 100;
    }

    #controls {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        gap: 20px;
        background: rgba(0, 0, 0, 0.3);
        padding: 15px 25px;
        border-radius: 10px;
        backdrop-filter: blur(5px);
    }

    .control-button {
        padding: 12px 28px;
        font-size: 18px;
        color: #fff;
        background: linear-gradient(45deg, #00bfff, #1e90ff);
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: 0 0 15px #00bfff;
        transition: all 0.3s ease;
    }

    .control-button:hover:not(:disabled) {
        box-shadow: 0 0 25px #00bfff, 0 0 5px #fff;
        transform: translateY(-2px);
    }

    .control-button:disabled {
        background: #555;
        cursor: not-allowed;
        box-shadow: none;
    }

    #winner-display {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 90px;
        font-weight: bold;
        color: var(--winner-glow-color);
        text-shadow: 0 0 20px var(--winner-glow-color), 0 0 35px #ff8c00;
        z-index: 1001;
        transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        pointer-events: none;
    }
</style>
</head>
<body>

<div id="watermark">北京AI25期【大模型】</div>


<canvas id="starry-sky"></canvas>
<div id="star-container"></div>
<div id="controls">
    <button id="algo-random-btn" class="control-button">算法随机</button>
    <button id="manual-toggle-btn" class="control-button">手动开始</button>
</div>
<div id="winner-display"></div>

<script>
    const starContainer = document.getElementById('star-container');
    const algoBtn = document.getElementById('algo-random-btn');
    const manualBtn = document.getElementById('manual-toggle-btn');
    const winnerDisplay = document.getElementById('winner-display');
    const canvas = document.getElementById('starry-sky');
    const ctx = canvas.getContext('2d');

    let isSpinning = false;
    let rotationAngle = 0;
    let animationFrameId;
    let stars = [];

    const names = [
  "冉吉平", "刘潇水", "邹宁宁", "罗鹏程", "李义", "杨凯", "翟佳乐", "武田", "高谦", "赵攀龙",
  "周洋", "许鑫", "李腾", "于智辉", "汪子豪", "郝梓瑜", "逯兴宇", "高浩然", "武雨泰", "王玮琦",
  "托景洋", "孙世豪", "白晓振", "董天帅", "束海威", "李奕孛", "焦文江", "李松荟", "张锋", "仝锡文",
  "郭二龙", "秦嘉伟", "王智永", "李文辉", "尹荷", "武文晖", "赵飞燕", "陈泽涛", "姜婷", "李琪",
  "吴育豪", "辛九辰", "付佳乐", "张翰文", "张宇", "幸鑫", "李涛", "赵吉伟", "汪旭", "谢继峰",
  "郝娇阳", "鲍迎春", "王明扬", "李刚帅", "王海博", "姬阳天", "张磊", "卢玉麒", "王洪各", "任康",
  "张茜", "张佳鑫", "王伟", "王天宇", "蒙春锋", "朱志梅", "许文超", "张杰", "周京华", "王充",
  "贾博元", "薛丁槊", "陈龙", "朱康伟", "袁超", "宋建领", "刘悦", "王璟", "王子涵", "范星宇",
  "马洪英", "关新宇", "黄晟"
];

    function resetState() {
        winnerDisplay.style.transform = 'translate(-50%, -50%) scale(0)';
        stars.forEach(star => {
            star.classList.remove('winner', 'dimmed');
            star.style.transform = star.style.getPropertyValue('--original-transform');
        });
        starContainer.style.transform = 'rotateY(0rad) rotateX(0rad)';
    }

    function createStars() {
        names.forEach((name) => {
            const star = document.createElement('div');
            star.className = 'star';
            star.textContent = name;
            star.style.animationDelay = `${Math.random() * 4}s`;
            starContainer.appendChild(star);
            stars.push(star);
        });
        positionStars();
    }

    function positionStars() {
        const margin = 100;
        stars.forEach(star => {
            const x = Math.random() * (window.innerWidth - margin * 2) + margin;
            const y = Math.random() * (window.innerHeight - margin * 2) + margin;
            const z = (Math.random() - 0.5) * 1000;
            const transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            star.style.setProperty('--original-transform', transform);
            star.style.transform = transform;
        });
    }

    function announceWinner(index) {
        const winner = stars[index];
        const winnerName = names[index];
        winnerDisplay.textContent = winnerName;
        winnerDisplay.style.transform = 'translate(-50%, -50%) scale(1)';
        stars.forEach(star => star.classList.add('dimmed'));
        winner.classList.add('winner');
    }

    // --- 点名逻辑 ---
    algoBtn.addEventListener('click', () => {
        if(isSpinning) return;
        resetState();
        algoBtn.disabled = true;
        manualBtn.disabled = true;
        let flashes = 0, lastIndex = -1;
        const flashInterval = setInterval(() => {
            if (lastIndex !== -1) stars[lastIndex].classList.remove('winner');
            const randomIndex = Math.floor(Math.random() * names.length);
            stars[randomIndex].classList.add('winner');
            lastIndex = randomIndex;
            if(++flashes >= 10) {
                clearInterval(flashInterval);
                const finalIndex = Math.floor(Math.random() * names.length);
                if (lastIndex !== -1) stars[lastIndex].classList.remove('winner');
                announceWinner(finalIndex);
                setTimeout(() => {
                    algoBtn.disabled = false;
                    manualBtn.disabled = false;
                }, 1500);
            }
        }, 100);
    });

    manualBtn.addEventListener('click', () => {
        if (!isSpinning) {
            resetState();
            isSpinning = true;
            manualBtn.textContent = '手动停止';
            algoBtn.disabled = true;
            spin();
        } else {
            isSpinning = false;
            cancelAnimationFrame(animationFrameId);
            manualBtn.textContent = '手动开始';
            algoBtn.disabled = false;
            const finalIndex = Math.floor(Math.random() * names.length);
            announceWinner(finalIndex);
        }
    });

    function spin() {
        if (isSpinning) {
            rotationAngle += 0.003;
            starContainer.style.transform = `rotateY(${rotationAngle}rad) rotateX(${rotationAngle * 0.3}rad)`;
            animationFrameId = requestAnimationFrame(spin);
        }
    }

    // --- 背景特效 ---
    let starParticles = [], meteors = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createStarParticles() {
        starParticles = [];
        for (let i = 0; i < 500; i++) {
            starParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.2,
                opacity: Math.random() * 0.5 + 0.5
            });
        }
    }

    function createMeteor() {
        const side = Math.floor(Math.random() * 3);
        let x, y, angle;
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;
        const offset = 100;

        switch (side) {
            case 0:
                x = Math.random() * canvasWidth; y = -offset;
                angle = Math.random() * Math.PI * 0.6 + Math.PI * 0.2;
                break;
            case 1:
                x = -offset; y = Math.random() * canvasHeight;
                angle = Math.random() * Math.PI * 0.6 - Math.PI * 0.3;
                break;
            case 2:
                x = canvasWidth + offset; y = Math.random() * canvasHeight;
                angle = Math.random() * Math.PI * 0.6 + Math.PI * 0.7;
                break;
        }

        meteors.push({ x, y, angle,
            len: Math.random() * 200 + 100,
            speed: Math.random() * 2 + 2,
        });
    }

    function scheduleNextMeteor() {
        if (meteors.length < 2) {
            createMeteor();
        }
        setTimeout(scheduleNextMeteor, Math.random() * 5000 + 4000);
    }

    function animateBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'white';
        starParticles.forEach(p => {
            ctx.globalAlpha = p.opacity;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.globalAlpha = 1;
        meteors.forEach((m, index) => {
            m.x += m.speed * Math.cos(m.angle);
            m.y += m.speed * Math.sin(m.angle);

            const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.len * Math.cos(m.angle), m.y - m.len * Math.sin(m.angle));
            grad.addColorStop(0, `rgba(255, 255, 255, 1)`);
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.strokeStyle = grad;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(m.x, m.y);
            ctx.lineTo(m.x - m.len * Math.cos(m.angle), m.y - m.len * Math.sin(m.angle));
            ctx.stroke();

            const buffer = m.len;
            if (m.x < -buffer || m.x > canvas.width + buffer || m.y < -buffer || m.y > canvas.height + buffer) {
                meteors.splice(index, 1);
            }
        });

        requestAnimationFrame(animateBackground);
    }

    // --- 初始化 ---
    window.addEventListener('resize', () => {
        resizeCanvas();
        createStarParticles();
        positionStars();
    });

    createStars();
    resizeCanvas();
    createStarParticles();
    animateBackground();
    scheduleNextMeteor();

</script>

</body>
</html>
